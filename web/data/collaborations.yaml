# Typisierte Kollaborations-Edges für die Architecture Map.
# Hand-kuratiert von Hongyu basierend auf KB-Wissen.
# Edge-Typ wird via Linien-Farbe + Marker visualisiert (siehe ArchMap.tsx).
#
# Slugs müssen in architecture-layers.yaml als member existieren.
# Edges deren source oder target nicht in der Map ist werden mit WARN
# übersprungen (siehe load-architecture.ts).

collaborations:
  # === MAF (microsoft-agent-framework) als Hub ===
  - source: microsoft-agent-framework
    target: foundry-models
    type: calls
    description: |
      MAF-Agent ruft Foundry Models für LLM-Inference auf. Modell-Wahl je
      Workload (GPT-4o für reasoning, Phi-4 für cost). PAYG vs PTU pricing
      depending on volume. Multi-Model-Fallback via APIM.

  - source: microsoft-agent-framework
    target: azure-openai-responses-api
    type: calls
    description: |
      Direkt-Zugriff auf Azure OpenAI's neue Responses API als Alternative
      zur älteren Chat Completions. Stateful conversation handling auf
      der API-Side, nicht im Agent-Code.

  - source: microsoft-agent-framework
    target: azure-ai-search
    type: grounds-on
    description: |
      MAF-Agent nutzt das Azure AI Search SDK für Vector-/Hybrid-Retrieval.
      CH-North verfügbar. Doc-level security via Entra. Agentic Retrieval
      (GA 2025) gibt +40% relevance vs traditional vector search.

  - source: microsoft-agent-framework
    target: foundry-iq
    type: grounds-on
    description: |
      Foundry IQ als verwalteter Knowledge-Wrapper auf Azure AI Search —
      convenience layer für MAF agents. Weniger Konfig als direct Search,
      automatische Re-Indexierung.

  - source: microsoft-agent-framework
    target: foundry-agent-service
    type: hosted-on
    description: |
      Managed Hosting für MAF-Agents in Azure. Aktuell nur North Central US
      verfügbar — DSGVO-Implication für EU-Kunden klären. Alternative für
      EU: self-host on Azure Functions oder Container Apps.

  - source: microsoft-agent-framework
    target: azure-functions
    type: hosted-on
    description: |
      Self-Hosting für MAF-Agents als Functions. Flex Consumption für
      scale-to-zero. MCP Binding (GA Jan 2026) ermöglicht das pattern,
      eine Function als MCP-Tool für andere Agents zu exposen.

  - source: microsoft-agent-framework
    target: azure-container-apps
    type: hosted-on
    description: |
      Container-basiertes Hosting für MAF agents — bevorzugt für
      lang-laufende Agents (>10 min). Dapr-Integration für state
      management und service-to-service calls.

  - source: microsoft-agent-framework
    target: entra-agent-id
    type: secured-by
    description: |
      Jeder MAF-Agent bekommt eine eigene Entra Agent ID. Voraussetzung
      für Conditional Access auf Agents. Sponsor-Konzept als
      DSGVO-Workaround für nicht-personenbezogene Identitäten.

  - source: microsoft-agent-framework
    target: dataverse-mcp-server
    type: integrated-via
    description: |
      MAF agent zugreift auf Dataverse-Tabellen via MCP-Wrapper.
      Dataverse-Tabellen werden als MCP-Tools exposed. Kein direkter
      Dataverse-API-Call nötig — Standard-MCP-Client reicht.

  # === Copilot Studio ===
  - source: copilot-studio
    target: microsoft-agent-framework
    type: uses
    description: |
      Copilot Studio's "Custom Engine Agent" Pfad delegiert an MAF
      für Code-first-Logik. Hybrid: Studio für Conversational UI +
      MAF für Tool-Use und Multi-Agent-Orchestrierung.

  - source: copilot-studio
    target: microsoft-graph
    type: grounds-on
    description: |
      Standard-Datenquelle für M365-zentrische Agents — emails, Teams
      chats, SharePoint docs, OneDrive files. Built-in, kein Connector nötig.

  - source: copilot-studio
    target: copilot-connectors
    type: grounds-on
    description: |
      Custom-Datenquellen via Graph Connectors integrieren. >100 OOB
      Connectors verfügbar (ServiceNow, Jira, Confluence, etc.).
      Custom-Schema-Snippet möglich.

  - source: copilot-studio
    target: dataverse
    type: grounds-on
    description: |
      Strukturierte Knowledge in Dataverse-Tabellen. Limit: 15 Tables
      pro Source, 500 Knowledge Objects insgesamt. Power-Platform-native.

  - source: copilot-studio
    target: foundry-models
    type: calls
    description: |
      Copilot Studio nutzt Foundry Models als Backend. Inkludiert
      neue Anthropic-Integration (Claude in EU/EFTA default-OFF
      seit 2026-04-17 — DPIA aktualisieren vor Enable).

  - source: copilot-studio
    target: entra-agent-id
    type: secured-by
    description: |
      Copilot Studio Agents bekommen Entra Agent IDs für Governance.
      Conditional Access kann auf einzelne Agents angewendet werden.

  # === M365 Copilot (Surface) ===
  - source: microsoft-365-copilot
    target: copilot-studio
    type: uses
    description: |
      User trifft AI über M365 Copilot Chat. Custom Agents (in Studio
      gebaut) erscheinen im selben UI als zusätzliche Personas.

  - source: microsoft-365-copilot
    target: microsoft-agent-framework
    type: uses
    description: |
      Declarative + Custom Engine Agents in Copilot Chat. MAF stellt
      die Logic-Schicht bei Code-first-Pfaden.

  - source: microsoft-365-copilot
    target: microsoft-graph
    type: grounds-on
    description: |
      Built-in M365 Daten-Grounding — kein zusätzlicher Connector nötig.
      Zugriff auf user-eigene M365-Daten via delegated permissions.

  - source: microsoft-365-copilot
    target: copilot-connectors
    type: grounds-on
    description: |
      External-Daten-Grounding via Connectors. Quota: 50 Mio Items
      pro Tenant. ACL-basierte Security Trimming auf Item-Level.

  # === M365 Agents SDK ===
  - source: m365-agents-sdk
    target: azure-functions
    type: hosted-on
    description: |
      Standard-Hosting für M365 Agents SDK Apps. Flex Consumption
      empfohlen für scale-to-zero. Activity-Protocol bleibt kompatibel
      mit Bot Framework Legacy-Code.

  - source: m365-agents-sdk
    target: azure-container-apps
    type: hosted-on
    description: |
      Alternative für stateful agents oder hohe Anforderungen an
      lang-laufende Sessions.

  - source: m365-agents-sdk
    target: entra-agent-id
    type: secured-by
    description: |
      Pflicht für Agents im M365-Ökosystem. Entra Agent ID identifiziert
      den Agent gegenüber Graph und anderen M365-Services.

  # === Foundry IQ + Search Symbiose ===
  - source: foundry-iq
    target: azure-ai-search
    type: calls
    description: |
      Foundry IQ ist ein Wrapper auf Azure AI Search — IQ orchestriert
      (Index-Management, automatische Re-Indexierung), Search liefert
      die eigentliche Vector/Hybrid Retrieval.

  # === Embeddings ===
  - source: azure-ai-search
    target: foundry-models
    type: calls
    description: |
      Search verwendet Foundry Models für Embeddings (typisch
      text-embedding-3-large für hohe Qualität, oder -small für Cost).

  # === APIM AI Gateway ===
  - source: apim-ai-gateway
    target: foundry-models
    type: calls
    description: |
      APIM proxied Foundry Models — Routing zwischen Modellen,
      Rate-Limiting (azure-openai-token-limit Policy), Token-Cost-Tracking,
      Fallback-Pattern bei Model-Outages.

  # === MCP-Host Pattern ===
  - source: foundry-agent-service
    target: model-context-protocol
    type: integrated-via
    description: |
      Foundry Agent Service ist MCP-Host — externe MCP-Tools werden
      hier als Agent-Capabilities verfügbar. Standard-MCP-Wrapper-Pattern,
      keine Custom-Integration pro Tool nötig.

  # === Deprecation Migrations ===
  - source: bot-framework
    target: m365-agents-sdk
    type: uses
    description: |
      MIGRATION (EOS 2025-12-31). Activity-Protocol bleibt kompatibel,
      TeamsFx → Agents Toolkit umstellen. Channel-Mapping behalten.
      Keine Custom-Adapter mehr nötig.

  - source: semantic-kernel
    target: microsoft-agent-framework
    type: uses
    description: |
      KONSOLIDIERUNG. SK + AutoGen → MAF (GA 2026-04-07). API
      weitgehend kompatibel. Kernel→Agent+Thread-Pattern. Planner
      entfällt — durch Workflow-API ersetzt.

  - source: autogen
    target: microsoft-agent-framework
    type: uses
    description: |
      KONSOLIDIERUNG. GroupChat-Pattern bleibt als RoundRobin/Sequential
      preserved. AutoGen Studio (UI) ohne 1:1-Ersatz — nur Code-Migration.

  # === Agent 365 Governance ===
  - source: agent-365
    target: microsoft-agent-framework
    type: uses
    description: |
      Agent 365 ist die Control-Plane für Agent Governance — RBAC,
      Audit-Logs, Sponsor-Konzept. Wraps MAF + Copilot Studio Agents
      gleichermassen. GA 2026-05-01.

  # === Agent Building Layer Erweiterung ===
  - source: copilot-studio
    target: power-automate
    type: calls
    description: |
      Copilot Studio ruft Power Automate Flows als Actions auf. Tausende
      OOB-Connectors verfügbar, Custom-Flows als Tools für Agents exposable.
      Low-Code-Pfad — keine Custom-Code-Tools nötig für Standard-Integrationen.

  - source: teams-sdk
    target: m365-agents-sdk
    type: uses
    description: |
      MIGRATION. Teams AI Library wird in M365 Agents SDK konsolidiert.
      Bestehender Teams-Bot-Code bleibt kompatibel — Activity-Protocol
      unverändert, nur Toolkit + Manifest-Format ändert sich.

  # === Hosting / Foundation Integration ===
  - source: logic-apps
    target: foundry-models
    type: calls
    description: |
      Logic Apps integriert Foundry Models über Azure OpenAI Connector.
      Low-Code-Pfad für AI-Workflows ohne eigenes Hosting — Trigger-basierte
      Inferenz (z.B. bei neuer SharePoint-Datei oder Form-Submission).

  - source: microsoft-agent-framework
    target: foundry-sdks
    type: uses
    description: |
      MAF nutzt Foundry SDKs für Modell-Aufrufe, Auth und Telemetrie.
      Einheitliches Client-Layer gegenüber Foundry Models — automatisches
      retry/backoff, OTel-Instrumentation und Token-Tracking eingebaut.

  - source: foundry-local
    target: foundry-models
    type: uses
    description: |
      Foundry Local führt Foundry Models on-device aus (CPU/GPU).
      Offline-Pfad für sensitive Workloads ohne Cloud-Roundtrip — Phi-4,
      Llama, Mistral lokal verfügbar. Gleiche API-Surface wie Cloud.

  - source: foundry-control-plane
    target: microsoft-foundry
    type: hosted-on
    description: |
      Control Plane ist die Management-Schicht der Microsoft Foundry —
      Project-Verwaltung, Quota, Deployment-Slots, Region-Failover. Eine
      Foundry-Subscription = ein Control-Plane-Endpunkt pro Region.

  - source: foundry-models
    target: microsoft-foundry
    type: hosted-on
    description: |
      Foundry Models laufen innerhalb Microsoft Foundry. Foundry stellt
      Multi-Tenancy, Region-Abstraktion und Cost-Tracking — Modelle
      erscheinen als deployable Resources im Foundry Project.

  # === Knowledge Layer Erweiterung ===
  - source: microsoft-agent-framework
    target: cosmos-db-for-ai
    type: grounds-on
    description: |
      Cosmos DB for AI als Vector Store für Agent-Memory und Long-Context-
      Retrieval. Native vector search (DiskANN-Index), Change Feed für
      inkrementelle Indexierung, Multi-Region-Replikation für Latenz.

  - source: fabric-data-agents
    target: microsoft-agent-framework
    type: uses
    description: |
      Fabric Data Agents werden auf MAF aufgebaut — Lakehouse-/Warehouse-
      Tabellen via OneLake als Knowledge-Quelle. Agent versteht Schema
      und führt SQL/Spark-Queries autonom aus. Preview seit 2026-Q1.

  # === Content Processing Hooks ===
  - source: microsoft-agent-framework
    target: azure-ai-document-intelligence
    type: uses
    description: |
      MAF-Agent ruft Document Intelligence für strukturierte Extraktion
      (Tabellen, Formulare, Verträge) vor dem Grounding. Custom Models
      trainierbar — z.B. für Schweizer Lohnausweise oder QR-Rechnungen.

  - source: microsoft-agent-framework
    target: azure-ai-content-understanding
    type: uses
    description: |
      Multimodale Vorverarbeitung (Audio, Video, Bild) bevor Daten in den
      Knowledge-Pfad gehen. Schema-driven Extraction — Agent definiert
      deklarativ, welche Felder aus dem Content extrahiert werden sollen.

  # === Governance Vollausbau ===
  - source: microsoft-agent-framework
    target: microsoft-purview
    type: secured-by
    description: |
      Purview governt MAF-Agent-Zugriff auf M365-Daten. Sensitivity Labels
      werden respektiert, Audit-Logs landen in Purview Compliance Manager,
      DLP-Policies blockieren Daten-Exfiltration auf Tool-Aufruf-Ebene.

  - source: microsoft-agent-framework
    target: defender-for-ai
    type: secured-by
    description: |
      Defender for AI Workloads erkennt Prompt-Injection, Jailbreak-Versuche
      und Anomalien in Agent-Traffic. Integration mit Defender XDR für
      SecOps-Alerts — Agent-Identity wird als eigene Entity geführt.

  - source: microsoft-agent-framework
    target: azure-ai-content-safety
    type: secured-by
    description: |
      Content Safety filtert Agent-Outputs (Hate, Sexual, Violence,
      Self-Harm) sowie Inputs auf Prompt-Injection. Konfigurierbare
      Thresholds pro Workload — strenger für externe vs interne Agents.

  - source: copilot-studio
    target: azure-ai-content-safety
    type: secured-by
    description: |
      Standard-Filter für Copilot Studio Agent-Antworten. Built-in
      Pre-/Post-Generation-Checks aktiv per Default. Blocked List +
      Banned Phrases tenant-weit konfigurierbar im Admin-Center.

  - source: entra-agent-id
    target: microsoft-entra-suite
    type: uses
    description: |
      Entra Agent ID ist Teil der erweiterten Entra Suite. Conditional
      Access, Identity Protection und Privileged Identity Management
      gelten gleich für menschliche User wie für Agent-Identitäten.

  - source: purview-dspm
    target: microsoft-purview
    type: uses
    description: |
      Data Security Posture Management ist Modul innerhalb Purview.
      Risk-Score über alle Datenquellen — sensitive Daten ohne Label,
      Über-Sharing-Risiken, AI-spezifische Posture-Insights.

  - source: purview-data-map
    target: microsoft-purview
    type: uses
    description: |
      Data Map ist das Katalog-Backbone von Purview. Auto-Discovery +
      Klassifikation über alle Sources — Voraussetzung für DSPM, DLP
      und Sensitivity-Label-Vererbung.
