# Produkte-Matrix für Stage-1-Filter.
# Walking-Skeleton: 1 Produkt aktiv. Weitere Tier-1-Produkte werden
# nach und nach zugefügt (siehe PLAN §2.5).

products:
  - slug: microsoft-agent-framework
    note: "Microsoft Agent Framework.md"
    primary_home_moc: "Agents MOC"
    tier: 1
    watch: close                 # close | standard | passive
    keywords:
      - "Microsoft Agent Framework"
      - "Agent Framework 1.0"
      - "MAF"
      - "microsoft/agent-framework"
    regex_exclude:
      - "Meta Agents Framework"  # falsche Positives vermeiden
    sources:
      - maf-github-releases
      - devblogs-semantic-kernel
      - azure-updates
    changelog_trigger_sections:
      - "Status & Pricing"
      - "Kernkonzept"
      - "Limitierungen & Fallstricke"
      - "Offizielle Referenzen & Monitoring"
    last_seen: 2026-04-21

