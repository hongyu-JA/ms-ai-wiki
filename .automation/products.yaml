# Produkte-Matrix für Stage-1-Filter.
# Tier-1 Notes sind `enabled: true` — Auto-Sync scannt sie täglich.
# Tier-2 und Tier-3 Stubs sind `enabled: false` bis die Note wirklich gefüllt ist
# und Monitoring sinnvoll wird.
#
# `tagline` ist die Single-Source-of-Truth für die „Was es ist (1 Satz)"-Spalte
# in den Primary-Home-MOCs. update-indices.ts generiert daraus die Tabelle
