# Data-Source-Matrix — siehe PLAN §2.3
# Typen: rss | atom | json-feed | github-releases | html
# Tier: A (daily), B (daily, rate-limited), C (weekly)
#
# 2026-05-02: Welle Y — von 2 aktiven auf 7 aktive Sources erweitert.
#   - azure-updates: URL auf v2-Endpoint umgestellt (alter feed/ liefert 404,
#     v2 liefert wieder valides RSS — ggf. Akamai-Block wenn aus CI; tolerant)
#   - devblogs-foundry: aktiviert (war "Platzhalter", liefert real Foundry-Posts)
#   - m365-roadmap: aktiviert (war "Platzhalter", liefert real M365-Roadmap-JSON)
#   - devblogs-identity (NEU): Entra/Identity-Blog für Agent ID + Entra Suite
#   - devblogs-microsoft365dev (NEU): M365-Dev-Blog für Copilot, Teams, Agents SDK

sources:
  - id: maf-github-releases
    tier: A
    type: github-releases
    url: https://api.github.com/repos/microsoft/agent-framework/releases
    covers: [microsoft-agent-framework]
    item_id_field: id
    enabled: true

  - id: devblogs-semantic-kernel
    tier: A
    type: rss
    url: https://devblogs.microsoft.com/semantic-kernel/feed/
    covers: [microsoft-agent-framework, semantic-kernel, autogen]
    enabled: true

  # Azure Updates — alter feed/ liefert 404. v2-Endpoint funktioniert (RSS 2.0,
  # ~100 items, daily). Akamai-Block möglicherweise nur historisch oder nur
  # bestimmte User-Agents/IPs. fetch.ts ist tolerant gegenüber Source-Fehlern,
  # also probieren wir es — wenn CI-Lauf 404 liefert, einfach disable.
  - id: azure-updates
    tier: A
    type: rss
    url: https://www.microsoft.com/releasecommunications/api/v2/azure/rss
    covers:
      - microsoft-foundry
      - azure-ai-search
      - azure-functions
      - azure-container-apps
      - apim-ai-gateway
      - foundry-models
      - foundry-agent-service
      - foundry-tools
      - azure-machine-learning
      - foundry-sdks
      - entra-agent-id
      - azure-ai-content-safety
    enabled: true

  # M365 Roadmap — JSON-Feed, ~100+ items mit Status (in development, rolling out,
  # launched). Wichtig für Copilot, Teams, Agents SDK.
  - id: m365-roadmap
    tier: A
    type: json-feed
    url: https://www.microsoft.com/releasecommunications/api/v1/m365
    covers:
      - microsoft-365-copilot
      - copilot-studio
      - agent-365
      - entra-agent-id
      - microsoft-365-e7
    enabled: true

  # Foundry Dev Blog — RSS, ~5 Posts, sehr aktuell zu Foundry-Komponenten.
  - id: devblogs-foundry
    tier: A
    type: rss
    url: https://devblogs.microsoft.com/foundry/feed/
    covers:
      - microsoft-foundry
      - foundry-models
      - foundry-agent-service
      - foundry-control-plane
      - foundry-iq
      - foundry-tools
      - foundry-local
      - foundry-sdks
    enabled: true

  # Entra/Identity Dev Blog — RSS, ~10 Posts. NEU 2026-05-02 hinzugefügt.
  - id: devblogs-identity
    tier: A
    type: rss
    url: https://devblogs.microsoft.com/identity/feed/
    covers:
      - entra-agent-id
      - microsoft-entra-suite
    enabled: true

  # Microsoft 365 Dev Blog — RSS, ~10 Posts. NEU 2026-05-02 hinzugefügt.
  # Enthält MAF-, Teams SDK-, Agent ID-, M365-Copilot-Themen.
  - id: devblogs-microsoft365dev
    tier: A
    type: rss
    url: https://devblogs.microsoft.com/microsoft365dev/feed/
    covers:
      - microsoft-365-copilot
      - copilot-studio
      - m365-agents-sdk
      - teams-sdk
      - copilot-connectors
      - microsoft-graph
    enabled: true
