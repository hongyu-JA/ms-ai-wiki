# Data-Source-Matrix — siehe PLAN §2.3
# Typen: rss | atom | json-feed | github-releases | html
# Tier: A (daily), B (daily, rate-limited), C (weekly)

sources:
  - id: maf-github-releases
    tier: A
    type: github-releases
    url: https://api.github.com/repos/microsoft/agent-framework/releases
    covers: [microsoft-agent-framework]
    item_id_field: id
    enabled: true

  - id: devblogs-semantic-kernel
    tier: A
    type: rss
    url: https://devblogs.microsoft.com/semantic-kernel/feed/
    covers: [microsoft-agent-framework]
    enabled: true

  # Azure Updates RSS liefert seit Q1/2026 einen 404 an der alten URL und die
  # neue API (releasecommunications/api/v2/azure/rss) ist Akamai-gesperrt.
  # Bis Microsoft einen neuen stabilen Feed publiziert: deaktiviert.
  - id: azure-updates
    tier: A
    type: rss
    url: https://azure.microsoft.com/en-us/updates/feed/
    covers: [microsoft-agent-framework]
    enabled: false

  # Platzhalter für spätere Quellen – bewusst deaktiviert, damit der
  # Walking-Skeleton nicht unnötig viele Requests macht.
  - id: m365-roadmap
    tier: A
    type: json-feed
    url: https://www.microsoft.com/releasecommunications/api/v1/m365
    covers: []
    enabled: false

  - id: devblogs-foundry
    tier: A
    type: rss
    url: https://devblogs.microsoft.com/foundry/feed/
    covers: []
    enabled: false
