name: Daily-Sync PR Reminder

# Wöchentlicher Reminder, falls Daily-Sync-PRs ungemergt liegen bleiben.
# Erstellt/aktualisiert ein Reminder-Issue (löst GitHub-E-Mail aus).
# Räumt das Issue automatisch wieder weg, sobald die PRs gemerged sind.

on:
  schedule:
    # Montag 07:23 UTC (~09:23 CET / CEST). Krumme Minute bewusst —
    # GitHub drosselt Cron-Events zur vollen Stunde.
    - cron: "23 7 * * 1"
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // 1. Offene Daily-Sync-PRs finden
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: "open", per_page: 100,
            });
            const syncPrs = prs.filter((p) => /KB Sync/i.test(p.title));

            // 2. Bestehendes Reminder-Issue finden (Label sync-reminder, kein PR)
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", labels: "sync-reminder", per_page: 100,
            });
            const existing = issues.find((i) => !i.pull_request);

            // 3a. Kein Rückstand → Reminder schliessen, falls offen
            if (syncPrs.length === 0) {
              if (existing) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: existing.number,
                  body: "✅ Alle Daily-Sync-PRs sind gemerged/geschlossen — Reminder wird geschlossen.",
                });
                await github.rest.issues.update({
                  owner, repo, issue_number: existing.number, state: "closed",
                });
              }
              core.info("Kein Rückstand — nichts zu tun.");
              return;
            }

            // 3b. Rückstand → Reminder erstellen/aktualisieren
            const list = syncPrs
              .sort((a, b) => b.number - a.number)
              .map((p) => `- [ ] #${p.number} — ${p.title}`)
              .join("\n");
            const title = `⏰ ${syncPrs.length} Daily-Sync-PR(s) warten auf Merge`;
            const body = [
              `⏰ **${syncPrs.length} Daily-Sync-PR(s) warten auf Review/Merge.**`,
              ``,
              `Bitte durchsehen und mergen (oder schliessen, wenn redundant):`,
              ``,
              list,
              ``,
              `_Tipp: Den **neuesten** (kumulativen) PR mergen, ältere schliessen — sie überschneiden sich meist (nur MOC-Datum + seen-items)._`,
              ``,
              `— automatischer wöchentlicher Reminder (Montag). Schliesst sich selbst, sobald der Rückstand weg ist.`,
            ].join("\n");

            if (existing) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.number, title, body,
              });
              core.info(`Reminder-Issue #${existing.number} aktualisiert.`);
            } else {
              // Label sicherstellen
              try {
                await github.rest.issues.getLabel({ owner, repo, name: "sync-reminder" });
              } catch {
                await github.rest.issues.createLabel({
                  owner, repo, name: "sync-reminder", color: "fbca04",
                  description: "Wöchentlicher Reminder für ungemergte Daily-Sync-PRs",
                });
              }
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: ["sync-reminder"],
              });
              core.info(`Reminder-Issue #${created.data.number} erstellt.`);
            }
